<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Healthcare Access - InBharat AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        header { background: #1a73e8; color: white; padding: 1rem; text-align: center; }
        header h1 { margin: 0; font-size: 1.5rem; }
        main { padding: 1rem; max-width: 600px; margin: auto; }
        form { background: white; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        select, input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
        .results { background: white; padding: 1rem; border-radius: 8px; }
        .center { text-align: center; }
        .icon { font-size: 1.5rem; margin: 0.5rem; }
        footer { text-align: center; padding: 1rem; background: #34a853; color: white; margin-top: 2rem; }
        footer small { display: block; margin-top: 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1>Healthcare Access</h1>
        <p>Empowering Rural Communities</p>
    </header>
    
    <main>
        <form id="symptomForm">
            <h2>Check Symptoms</h2>
            <label><input type="checkbox" name="symptoms" value="fever"> Fever</label><br>
            <label><input type="checkbox" name="symptoms" value="cough"> Cough</label><br>
            <label><input type="checkbox" name="symptoms" value="stomach"> Stomach pain</label><br>
            <label><input type="checkbox" name="symptoms" value="headache"> Headache</label><br>
            <button type="submit">Get Advice</button>
        </form>
        
        <div class="results" id="adviceBox" style="display:none;">
            <h3>Medical Advice</h3>
            <p id="adviceText"></p>
            <div class="center">
                <div class="icon">🏥</div>
                <p>Visit your nearest health center:</p>
                <ul id="centerList"></ul>
            </div>
        </div>
    </main>
    
    <footer>
        <p>Powered by InBharat AI — AI for India</p>
        <small>© 2026 InBharat AI. All rights reserved.</small>
    </footer>
    
    <script>
        const centers = [
            { name: "Rural Health Center A", address: "Village Khera, Dist. Jaipur", contact: "0123456789" },
            { name: "Mobile Health Unit B", address: "Near Bus Stand, Dist. Udaipur", contact: "0987654321" },
            { name: "Community Health Post C", address: "P.O. Box 123, Dist. Kota", contact: "0112233445" }
        ];
        
        const symptomAdvice = {
            fever: "Stay hydrated. Take paracetamol if needed. Seek immediate help if fever exceeds 102°F.",
            cough: "Use steam inhalation. Avoid smoking. Consult a doctor if cough persists for more than 2 weeks.",
            stomach: "Avoid spicy food. Take oral rehydration salts. Seek help if vomiting persists.",
            headache: "Rest in a dark room. Take ibuprofen. Seek medical attention if headache is severe or persistent."
        };
        
        document.getElementById('symptomForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const selected = Array.from(document.querySelectorAll('input[name="symptoms"]:checked'))
                .map(i => i.value);
            
            if (selected.length === 0) {
                alert("Please select at least one symptom");
                return;
            }
            
            const advice = selected.map(sym => symptomAdvice[sym]).join("<br>");
            document.getElementById('adviceText').innerHTML = advice;
            
            const list = document.getElementById('centerList');
            list.innerHTML = centers.map(c => 
                `<li><strong>${c.name}</strong><br>${c.address}<br>📞 ${c.contact}</li>`
            ).join("");
            
            document.getElementById('adviceBox').style.display = 'block';
        });
    </script>
</body>
</html>
